<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForkIt! - Random Restaurant Picker</title>
    <meta name="description" content="Can't decide where to eat? One tap, one random restaurant near you. Available on Google Play and the App Store." />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(180deg, #0D0D0D 0%, #1A1410 50%, #0D0D0D 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.92);
            padding: 20px;
        }

        .container { max-width: 500px; text-align: center; }

        h1 { font-size: 48px; font-weight: 900; margin-bottom: 8px; }
        .fork { color: #2DD4BF; }
        .it { color: #FB923C; }

        .tagline {
            font-size: 18px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 32px;
        }

        .description {
            font-size: 16px;
            line-height: 1.6;
            color: rgba(255,255,255,0.65);
            margin-bottom: 32px;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
        }

        .btn {
            display: inline-block;
            padding: 14px 28px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            transition: transform 0.15s, opacity 0.15s;
        }

        .btn:hover { transform: scale(1.03); opacity: 0.9; }

        .btn-play {
            background: #2DD4BF;
            color: #0D0D0D;
        }

        .btn-apple {
            background: #FB923C;
            color: #0D0D0D;
        }

        .btn-web {
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.8);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .footer {
            margin-top: 40px;
            font-size: 13px;
            color: rgba(255,255,255,0.4);
        }

        .footer a {
            color: rgba(255,255,255,0.55);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><span class="fork">Fork</span><span class="it">It!</span></h1>
        <p class="tagline">Can't decide where to eat? Let fate decide.</p>

        <p class="description">
            One tap. One random restaurant near you. No more "I don't care, you pick" conversations.
            Filters for distance, price, rating, cuisine, and more.
        </p>

        <div class="buttons">
            <a href="https://play.google.com/store/apps/details?id=com.ctuckersolutions.forkit" class="btn btn-play" target="_blank" rel="noopener">
                Get it on Google Play
            </a>
            <a href="https://apps.apple.com/app/forkit-restaurant-picker/id6759990349" class="btn btn-apple" target="_blank" rel="noopener">
                Download on the App Store
            </a>
            <a href="https://forkit-web.vercel.app" class="btn btn-web" target="_blank" rel="noopener">
                Visit forkit-web.vercel.app
            </a>
        </div>

        <footer class="footer">
            <a href="privacy.html">Privacy Policy</a> &middot;
            <a href="https://github.com/CherrelleTucker/forkit" target="_blank" rel="noopener">GitHub</a>
        </footer>
    </div>
</body>
</html>
